# Decap CMS configuration
#
# AUTHENTICATION (one-time setup, see README "CMS authentication"):
#   GitHub's OAuth flow needs a tiny token-exchange service. Two free options:
#   1. Cloudflare Worker OAuth proxy (recommended, free) — then set
#      `base_url` below to your worker URL.
#   2. Netlify OAuth gateway — create a free Netlify site linked to this repo,
#      add a GitHub OAuth app in Netlify settings, and remove `base_url`.
#
# LOCAL EDITING (no auth needed):
#   Run `npx decap-server` in one terminal and `npm run dev` in another,
#   then open http://localhost:4321/admin/
backend:
  name: github
  repo: sepamir1992/sepamir1992.github.io
  branch: main
  # TODO: after deploying an OAuth proxy (see README), set its URL here:
  # base_url: https://your-oauth-proxy.example.workers.dev

# Allows editing without auth when running `npx decap-server` locally.
local_backend: true

publish_mode: simple

media_folder: "public/uploads/images"
public_folder: "/uploads/images"

site_url: https://sepamir1992.github.io
display_url: https://sepamir1992.github.io
logo_url: https://sepamir1992.github.io/favicon.svg

collections:
  # ---------- Site settings (single files) ----------
  - name: settings
    label: "Site Settings"
    files:
      - name: profile
        label: "Profile / Bio"
        file: "src/data/profile.json"
        fields:
          - { name: name, label: "Full Name", widget: string }
          - { name: title, label: "Professional Title", widget: string }
          - { name: affiliation, label: "Affiliation", widget: string }
          - { name: tagline, label: "Tagline (hero subtitle)", widget: string }
          - { name: bioShort, label: "Short Bio", widget: text }
          - name: headshot
            label: "Headshot Photo"
            widget: image
            required: false
          - name: cv
            label: "CV (PDF)"
            widget: file
            required: false
            media_folder: "/public/uploads/cv"
            public_folder: "/uploads/cv"
          - name: badges
            label: "Research Focus Badges"
            widget: list
            field: { name: badge, label: Badge, widget: string }
      - name: contact
        label: "Contact & Social Links"
        file: "src/data/contact.json"
        fields:
          - { name: email, label: "Email", widget: string }
          - { name: github, label: "GitHub URL", widget: string, required: false }
          - { name: linkedin, label: "LinkedIn URL", widget: string, required: false }
          - { name: scholar, label: "Google Scholar URL", widget: string, required: false }
          - { name: twitter, label: "Twitter/X URL", widget: string, required: false }
          - { name: location, label: "Location", widget: string, required: false }

  # ---------- Research areas ----------
  - name: research
    label: "Research Areas"
    folder: "src/content/research"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: description, label: "Short Description (card text)", widget: text }
      - name: icon
        label: Icon
        widget: select
        options: [network, video, brain, shield, wifi, chat, automation, chart]
        default: network
      - { name: order, label: "Display Order", widget: number, default: 99 }
      - { name: body, label: "Details (optional, shown on /research)", widget: markdown, required: false }

  # ---------- Projects ----------
  - name: projects
    label: "Projects"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: summary, label: "Short Summary", widget: text }
      - name: technologies
        label: Technologies
        widget: list
        default: []
        field: { name: technology, label: Technology, widget: string }
      - { name: researchArea, label: "Research Area", widget: string, required: false }
      - { name: role, label: "Your Role", widget: string, required: false }
      - { name: impact, label: "Impact / Results", widget: text, required: false }
      - name: links
        label: Links
        widget: object
        required: false
        fields:
          - { name: github, label: "GitHub URL", widget: string, required: false }
          - { name: demo, label: "Demo URL", widget: string, required: false }
          - { name: paper, label: "Paper URL", widget: string, required: false }
          - { name: slides, label: "Slides URL", widget: string, required: false }
      - { name: coverImage, label: "Cover Image", widget: image, required: false }
      - name: gallery
        label: "Gallery Images"
        widget: list
        required: false
        default: []
        field: { name: image, label: Image, widget: image }
      - { name: featured, label: "Featured on homepage", widget: boolean, default: false }
      - { name: order, label: "Display Order", widget: number, default: 99 }
      - { name: date, label: Date, widget: datetime, required: false }
      - { name: body, label: "Full Description", widget: markdown }

  # ---------- Publications ----------
  - name: publications
    label: "Publications"
    folder: "src/content/publications"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: authors, label: "Authors (e.g. A. Sepahi, J. Doe)", widget: string }
      - { name: venue, label: "Venue / Journal / Conference", widget: string, required: false }
      - { name: year, label: Year, widget: number, value_type: int }
      - name: status
        label: Status
        widget: select
        options:
          - { label: "Published", value: published }
          - { label: "Accepted", value: accepted }
          - { label: "Under Review", value: under-review }
          - { label: "Preprint", value: preprint }
          - { label: "In Preparation", value: in-preparation }
        default: published
      - { name: doi, label: "DOI (e.g. 10.1109/xxx)", widget: string, required: false }
      - { name: arxiv, label: "arXiv URL", widget: string, required: false }
      - name: pdf
        label: "PDF (upload or link)"
        widget: file
        required: false
        media_folder: "/public/uploads/papers"
        public_folder: "/uploads/papers"
      - { name: bibtex, label: "BibTeX", widget: text, required: false }
      - name: tags
        label: Tags
        widget: list
        required: false
        default: []
        field: { name: tag, label: Tag, widget: string }
      - { name: abstract, label: Abstract, widget: text, required: false }
      - { name: featured, label: "Featured on homepage", widget: boolean, default: false }
      - { name: body, label: "Notes (optional)", widget: markdown, required: false }

  # ---------- Photography ----------
  - name: photos
    label: "Photography"
    folder: "src/content/photos"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: image, label: Photo, widget: image }
      - { name: alt, label: "Alt Text (describe the photo for accessibility)", widget: string }
      - { name: location, label: Location, widget: string, required: false }
      - { name: date, label: "Date Taken", widget: datetime, required: false }
      - { name: caption, label: Caption, widget: text, required: false }
      - name: category
        label: Category
        widget: select
        options: [travel, nature, city, people, events, other]
        default: other
      - { name: featured, label: "Featured on homepage", widget: boolean, default: false }

  # ---------- News / highlights ----------
  - name: news
    label: "News & Highlights"
    folder: "src/content/news"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date, label: Date, widget: datetime }
      - { name: description, label: Description, widget: text, required: false }
      - { name: link, label: "Link (optional)", widget: string, required: false }
